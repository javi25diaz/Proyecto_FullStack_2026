<div class="dashboard-wrapper">
  <header class="dashboard-header">
    <h1>⚡ CRM MEAN 2026</h1>
    <span class="header-sub">Catálogo de Productos</span>
  </header>

  <main class="dashboard-content">

    <div class="loading" *ngIf="cargando">Cargando productos...</div>

    <div class="error-msg" *ngIf="error">{{ error }}</div>

    <div class="products-list" *ngIf="!cargando && !error">
      <div class="product-row" *ngFor="let p of productos">
        <div class="product-icon">{{ p.icono }}</div>
        <div class="product-info">
          <div class="product-top">
            <h3 class="product-name">{{ p.nombre }}</h3>
            <span class="product-category">{{ p.categoria }}</span>
          </div>
          <p class="product-desc">{{ p.descripcion }}</p>
        </div>
        <div class="product-price">\${{ p.precio | number:'1.2-2' }}</div>
      </div>

      <div class="empty" *ngIf="productos.length === 0">
        No hay productos disponibles.
      </div>
    </div>

  </main>
</div>
